<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Price Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8' },
                    }
                }
            }
        }
    </script>
    <style>
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
    <!-- Nav -->
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6">
            <div class="flex justify-between items-center h-16">
                <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-brand-600">
                    <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/>
                    </svg>
                    Price Monitor
                </a>
                <span id="last-checked" class="text-xs text-gray-400"></span>
            </div>
        </div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto px-4 sm:px-6 py-8 w-full">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-2xl font-bold text-gray-900">Tracked Products</h1>
                <p class="text-gray-500 mt-1" id="product-count"></p>
            </div>
            <a href="https://github.com/rvr8/price-monitor/issues/new?template=add-product.yml" target="_blank"
                class="inline-flex items-center gap-2 bg-brand-600 text-white px-4 py-2 rounded-lg hover:bg-brand-700 transition font-medium text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                Add Product
            </a>
        </div>

        <!-- Add Product / Add Retailer links -->
        <div class="flex gap-3 mb-6">
            <a href="https://github.com/rvr8/price-monitor/issues/new?template=add-product.yml" target="_blank"
                class="inline-flex items-center gap-2 bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:border-brand-300 hover:shadow transition text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                Track New Product
            </a>
            <a href="https://github.com/rvr8/price-monitor/issues/new?template=add-retailer.yml" target="_blank"
                class="inline-flex items-center gap-2 bg-white border border-gray-200 text-gray-700 px-4 py-2 rounded-lg hover:border-brand-300 hover:shadow transition text-sm">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"/></svg>
                Add Retailer URL
            </a>
        </div>

        <div id="products-grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
            <!-- Filled by JS -->
        </div>

        <div id="empty-state" class="text-center py-20 hidden">
            <h2 class="text-xl font-semibold text-gray-600 mb-2">No products tracked yet</h2>
            <p class="text-gray-400">Use manage.py to add products to track.</p>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-4 mt-auto">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center text-gray-400 text-sm">
            Price Monitor — Tracking prices across Romanian retailers
        </div>
    </footer>

<script>
const DB_URL = 'db.json';

async function loadDashboard() {
    try {
        const resp = await fetch(DB_URL + '?t=' + Date.now());
        const db = await resp.json();

        document.getElementById('last-checked').textContent = db.last_checked
            ? 'Last checked: ' + new Date(db.last_checked).toLocaleString()
            : '';

        const products = db.products || [];
        document.getElementById('product-count').textContent =
            products.length + ' product' + (products.length !== 1 ? 's' : '') + ' monitored';

        if (products.length === 0) {
            document.getElementById('empty-state').classList.remove('hidden');
            return;
        }

        const grid = document.getElementById('products-grid');
        grid.innerHTML = '';

        for (const product of products) {
            const history = db.price_history.filter(h => h.product_id === product.id);

            // Get latest price per URL
            const latestByUrl = {};
            for (const h of history) {
                latestByUrl[h.url] = h;
            }
            const latestPrices = Object.values(latestByUrl);
            const bestPrice = latestPrices.length ? Math.min(...latestPrices.map(p => p.price)) : null;
            const bestRetailer = latestPrices.find(p => p.price === bestPrice);
            const allPrices = history.map(h => h.price);
            const allTimeLow = allPrices.length ? Math.min(...allPrices) : null;
            const avg = allPrices.length ? Math.round(allPrices.reduce((a, b) => a + b, 0) / allPrices.length) : null;
            const inStock = latestPrices.filter(p => p.in_stock).length;

            // Buy signal
            let signal = '', signalColor = '';
            if (bestPrice !== null && allTimeLow !== null) {
                if (bestPrice <= allTimeLow) { signal = 'Best price ever'; signalColor = 'text-emerald-600 bg-emerald-50'; }
                else if (bestPrice <= avg) { signal = 'Below average'; signalColor = 'text-blue-600 bg-blue-50'; }
                else { signal = 'Above average'; signalColor = 'text-amber-600 bg-amber-50'; }
            }

            // Retailer badges
            const badges = latestPrices.map(p => {
                const r = product.tracked_urls.find(u => u.url === p.url);
                const retailer = r ? r.retailer : '?';
                const stockClass = p.in_stock
                    ? 'bg-emerald-50 text-emerald-700 border-emerald-200'
                    : 'bg-red-50 text-red-600 border-red-200';
                const dot = p.in_stock
                    ? '<span class="w-1.5 h-1.5 rounded-full bg-emerald-500"></span>'
                    : '<span class="w-1.5 h-1.5 rounded-full bg-red-400"></span>';
                return `<span class="inline-flex items-center gap-1 px-2 py-1 rounded-full text-xs font-medium border ${stockClass}">${dot} ${retailer} — ${Math.round(p.price)} Lei</span>`;
            }).join('');

            const uniqueRetailers = [...new Set(product.tracked_urls.map(u => u.retailer))];

            const card = document.createElement('a');
            card.href = 'product.html?id=' + encodeURIComponent(product.id);
            card.className = 'bg-white rounded-xl border border-gray-200 hover:border-brand-300 hover:shadow-lg transition-all duration-200 overflow-hidden group';
            card.innerHTML = `
                ${product.image_url
                    ? `<div class="h-48 bg-gray-100 flex items-center justify-center overflow-hidden">
                        <img src="${product.image_url}" alt="${product.name}" class="max-h-full max-w-full object-contain p-4 group-hover:scale-105 transition-transform duration-200">
                       </div>`
                    : `<div class="h-48 bg-gradient-to-br from-brand-50 to-brand-100 flex items-center justify-center">
                        <svg class="w-16 h-16 text-brand-200" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                       </div>`}
                <div class="p-5">
                    <h3 class="font-semibold text-gray-900 text-lg mb-3 line-clamp-2 group-hover:text-brand-600 transition">${product.name}</h3>
                    ${bestPrice !== null ? `
                    <div class="flex items-end justify-between mb-3">
                        <div>
                            <div class="text-sm text-gray-500 mb-0.5">Best price</div>
                            <div class="text-2xl font-bold text-brand-600">${Math.round(bestPrice)} <span class="text-base font-normal text-gray-400">Lei</span></div>
                        </div>
                        ${signal ? `<span class="text-xs font-medium px-2 py-1 rounded-full ${signalColor}">${signal}</span>` : ''}
                    </div>` : '<div class="text-gray-400 mb-3">No price data yet</div>'}
                    <div class="flex flex-wrap gap-1.5">${badges}</div>
                    <div class="mt-3 text-xs text-gray-400">${product.tracked_urls.length} variant${product.tracked_urls.length !== 1 ? 's' : ''} across ${uniqueRetailers.length} retailer${uniqueRetailers.length !== 1 ? 's' : ''}</div>
                </div>
            `;
            grid.appendChild(card);
        }
    } catch (e) {
        console.error('Failed to load data:', e);
        document.getElementById('empty-state').classList.remove('hidden');
        document.getElementById('empty-state').querySelector('h2').textContent = 'Failed to load data';
    }
}

loadDashboard();

</script>
</body>
</html>
