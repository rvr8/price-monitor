<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Archive — Price Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brand: { 50:'#eff6ff',100:'#dbeafe',200:'#bfdbfe',300:'#93c5fd',400:'#60a5fa',500:'#3b82f6',600:'#2563eb',700:'#1d4ed8',800:'#1e40af',900:'#1e3a8a' }}}}
        }
    </script>
</head>
<body class="bg-gradient-to-br from-orange-50 via-white to-blue-50 min-h-screen flex flex-col">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 py-3 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-xl font-bold text-brand-600">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z"/></svg>
                Price Monitor
            </a>
            <div class="flex items-center gap-4 text-sm">
                <a href="index.html" class="text-gray-500 hover:text-brand-600">Dashboard</a>
                <a href="retailers.html" class="text-gray-500 hover:text-brand-600">Retailers</a>
                <span class="text-brand-600 font-medium">Archive</span>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 flex-1 w-full">
        <h1 class="text-2xl font-bold text-gray-900 mb-1">Archived Products</h1>
        <p class="text-sm text-gray-500 mb-6">Products that are no longer actively tracked. You can restore them at any time.</p>

        <div id="archive-list" class="space-y-3">
            <div class="text-center text-gray-400 py-12">Loading...</div>
        </div>

        <div id="empty-state" class="hidden text-center py-12">
            <svg class="w-16 h-16 mx-auto text-gray-300 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"/>
            </svg>
            <p class="text-gray-500">No archived products</p>
            <a href="index.html" class="text-brand-500 hover:underline text-sm mt-2 inline-block">Back to Dashboard</a>
        </div>
    </main>

    <footer class="bg-white border-t border-gray-200 py-4 mt-auto">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 text-center text-gray-400 text-sm">
            Price Monitor — Tracking prices across Romanian retailers
        </div>
    </footer>

<script>
const DB_URL_PRIMARY = 'https://api.github.com/repos/rvr8/price-monitor/contents/docs/db.json';
const DB_URL_FALLBACK = '/db.json';

async function fetchDb() {
    try {
        const resp = await fetch(DB_URL_PRIMARY, {
            headers: { 'Accept': 'application/vnd.github.v3.raw' }
        });
        if (resp.ok) return resp.json();
    } catch {}
    const resp = await fetch(DB_URL_FALLBACK + '?t=' + Date.now());
    return resp.json();
}

async function loadArchive() {
    try {
        const db = await fetchDb();
        const archived = db.archived_products || [];

        if (archived.length === 0) {
            document.getElementById('archive-list').classList.add('hidden');
            document.getElementById('empty-state').classList.remove('hidden');
            return;
        }

        const list = document.getElementById('archive-list');
        list.innerHTML = archived.map(p => {
            const archivedDate = p.archived_at
                ? new Date(p.archived_at).toLocaleDateString()
                : 'Unknown';
            const urlCount = p.tracked_urls ? p.tracked_urls.length : 0;
            const retailers = p.tracked_urls
                ? [...new Set(p.tracked_urls.map(u => u.retailer))].join(', ')
                : '';

            return `
            <div class="bg-white rounded-xl border border-gray-200 p-4 flex flex-col sm:flex-row sm:items-center gap-3">
                <div class="flex items-center gap-3 flex-1 min-w-0">
                    ${p.image_url
                        ? `<img src="${p.image_url}" alt="" class="w-14 h-14 object-contain rounded-lg border border-gray-100 bg-white p-1 flex-shrink-0">`
                        : `<div class="w-14 h-14 bg-gray-100 rounded-lg flex items-center justify-center flex-shrink-0">
                            <svg class="w-6 h-6 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
                           </div>`}
                    <div class="min-w-0">
                        <div class="font-semibold text-gray-900 truncate">${p.name}</div>
                        <div class="text-xs text-gray-500">${urlCount} URL${urlCount !== 1 ? 's' : ''} • ${retailers}</div>
                        <div class="text-xs text-gray-400">Archived ${archivedDate}</div>
                    </div>
                </div>
                <div class="flex gap-2 flex-shrink-0">
                    <button onclick="restoreProduct('${p.id}')" class="px-3 py-1.5 rounded-lg text-sm font-medium border border-emerald-300 text-emerald-700 bg-emerald-50 hover:bg-emerald-100 transition">
                        Restore
                    </button>
                    <button onclick="deleteProduct('${p.id}', '${p.name.replace(/'/g, "\\'")}')" class="px-3 py-1.5 rounded-lg text-sm font-medium border border-red-300 text-red-700 bg-red-50 hover:bg-red-100 transition">
                        Delete
                    </button>
                </div>
            </div>`;
        }).join('');

    } catch (e) {
        document.getElementById('archive-list').innerHTML =
            '<div class="text-center text-red-500 py-8">Failed to load archive: ' + e.message + '</div>';
    }
}

async function restoreProduct(productId) {
    if (!confirm('Restore this product to active tracking?')) return;
    try {
        const resp = await fetch('/api/product', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'restore', product_id: productId }),
        });
        if (resp.ok) {
            location.reload();
        } else {
            const data = await resp.json();
            alert('Failed: ' + (data.error || 'Unknown error'));
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

async function deleteProduct(productId, name) {
    if (!confirm('Permanently delete "' + name + '" and all its price history?')) return;
    try {
        const resp = await fetch('/api/product', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: 'delete', product_id: productId }),
        });
        if (resp.ok) {
            location.reload();
        } else {
            const data = await resp.json();
            alert('Failed: ' + (data.error || 'Unknown error'));
        }
    } catch (e) {
        alert('Error: ' + e.message);
    }
}

loadArchive();
</script>
</body>
</html>
